name: Cross-Platform Derleyici
on: [push, workflow_dispatch]
name: Cross-Platform Derleyici

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 requests opencv-python numpy python-pptx
          
      - name: Windows İçin Derleme
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon="app_icon.ico" --name="FootyscopeFG" --add-data "player_asset.png;." --add-data "gk_asset.png;." analiz.py
          
      - name: Mac İçin Derleme ve DMG Oluşturma
        if: matrix.os == 'macos-latest'
        run: |
          # PyInstaller ile ana yapıyı kuruyoruz
          pyinstaller --noconfirm --windowed --icon="app_icon.icns" --name="FootyscopeFG" --add-data "player_asset.png:." --add-data "gk_asset.png:." analiz.py
          # DMG paketleme işlemi
          hdiutil create -volname "FootyscopeFG" -srcfolder dist/FootyscopeFG.app -ov -format UDZO dist/FootyscopeFG-Mac.dmg
          
      - name: Dosyaları Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FootyscopeFG-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg