name: Cross-Platform Derleyici

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 requests opencv-python numpy python-pptx
      - name: Derleme
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pyinstaller --noconfirm --onefile --windowed --icon="app_icon.ico" --name="FootyscopeFG" --collect-all PyQt6 --add-data "player_asset.png;." --add-data "gk_asset.png;." analiz.py
          else
            pyinstaller --noconfirm --onefile --windowed --name="FootyscopeFG" --collect-all PyQt6 --add-data "player_asset.png:." --add-data "gk_asset.png:." analiz.py
          fi
      - name: Dosyayı Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FootyscopeFG-${{ matrix.os }}
          path: dist/FootyscopeFG*