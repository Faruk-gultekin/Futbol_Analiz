name: Windows EXE Derleyici

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 requests opencv-python numpy python-pptx
      - name: Derleme
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "FootyscopeFG" --add-data "player_asset.png;." --add-data "gk_asset.png;." analiz.py
      - name: Dosyayı Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: FootyscopeFG-Windows-EXE
          path: dist/FootyscopeFG.exe